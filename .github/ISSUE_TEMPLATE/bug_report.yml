name: Bug report
description: Report a reproducible problem in MikaVN Library.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please redact private paths, API keys, and logs before posting.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Runtime mode
      options:
        - Tauri desktop app
        - Browser preview
        - Both
        - Not sure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest workflow that reproduces the problem.
      placeholder: |
        1. Open Settings...
        2. Click...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or screenshots
      description: Attach only redacted logs/screenshots that you have permission to share.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checklist
      options:
        - label: I removed API keys, tokens, passwords, and private personal paths.
          required: true
        - label: I did not attach copyrighted game assets or screenshots I cannot redistribute.
          required: true
