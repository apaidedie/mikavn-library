name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Check release metadata
        run: npm run release:check:strict

      - name: Run script unit tests
        run: |
          npm run test:release-scripts
          npm run test:playwright-scripts

      - name: Run frontend build
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Require updater signing secrets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is required for tagged updater releases."
          }

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Create updater metadata
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $version = [string]$package.version
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $installer = Get-ChildItem $bundleDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw "No NSIS installer found in $bundleDir." }
          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path -LiteralPath $signaturePath)) { throw "Missing updater signature: $signaturePath." }
          $signature = (Get-Content -LiteralPath $signaturePath -Raw).Trim()
          $notes = Get-Content docs/RELEASE_NOTES_TEMPLATE.md -Raw
          $metadata = [ordered]@{
            version = "v$version"
            notes = $notes
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = "https://github.com/apaidedie/mikavn-library/releases/download/v$version/$($installer.Name)"
              }
            }
          }
          $metadata | ConvertTo-Json -Depth 8 | Set-Content -LiteralPath (Join-Path $bundleDir "latest.json") -Encoding UTF8

      - name: Run clean install smoke
        run: npm run smoke:install

      - name: Run portable app-data smoke
        run: npm run smoke:portable-data

      - name: Run desktop smoke
        run: npm run smoke:desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: mikavn-library-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/latest.json

      - name: Upload desktop smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-smoke-report
          path: |
            output/clean-install-smoke/**
            output/portable-app-data-smoke/**
            output/desktop-smoke/**

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/latest.json
          body_path: docs/RELEASE_NOTES_TEMPLATE.md
