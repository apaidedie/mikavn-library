name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Check release metadata
        run: npm run release:check:strict

      - name: Run frontend build
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri bundle
        run: npm run tauri:build

      - name: Run clean install smoke
        run: npm run smoke:install

      - name: Run desktop smoke
        run: npm run smoke:desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: mikavn-library-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload desktop smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-smoke-report
          path: |
            output/clean-install-smoke/**
            output/desktop-smoke/**

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          body_path: docs/RELEASE_NOTES_TEMPLATE.md
